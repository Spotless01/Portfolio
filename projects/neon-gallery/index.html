<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>⚡Emmanuel's Cyber Gallery</h1>
</header>

<!-- FILTER BUTTONS -->
<div class="filter-btns glow-box">
    <button class="btn active" data-filter="all">All</button>
    <button class="btn" data-filter="nature">Nature</button>
    <button class="btn" data-filter="city">City</button>
    <button class="btn" data-filter="people">People</button>
</div>

<!-- SEARCH BAR -->
<div class="search-box glow-box">
    <input type="text" id="search" placeholder="Search images... (water, street, smile)">
</div>

<!-- GALLERY -->
<div class="gallery">

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
    <button id="prevBtn" class="nav-btn">Previous</button>

    <img id="lightboxImage" src="" alt="">

    <button id="nextBtn" class="nav-btn">Next</button>

    <button id="closeBtn" class="close-btn">Close ✕</button>
</div>
