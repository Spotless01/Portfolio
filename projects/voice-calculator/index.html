<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hologram Orb Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-nebula">

<!-- STARTUP ANIMATION OVERLAY -->
<div class="startup" id="startup" aria-hidden="true">
  <div class="boot-text">INITIALIZING HOLOGRAPHIC INTERFACE...</div>
</div>

<!-- THEME & SOUND PANEL -->
<div class="control-panel" role="region" aria-label="Controls">
  <select id="themeSwitch" aria-label="Theme switch">
    <option value="nebula">Nebula Core</option>
    <option value="solar">Solar Flare</option>
    <option value="cryo">Cryo Glacier</option>
    <option value="prism">Quantum Prism</option>
  </select>

  <label class="sound-toggle" title="Toggle button sounds">
    <input type="checkbox" id="soundToggle" />
    <span>Sound</span>
  </label>

  <label class="speech-toggle" title="Announce results">
    <input type="checkbox" id="speechToggle" />
    <span>Speak</span>
  </label>

  <!-- Voice button -->
  <button id="voiceBtn" title="Start voice input" aria-pressed="false">🎤</button>

  <button id="historyToggle" title="Toggle history">🕘</button>
</div>

<div class="orb-container">
  <div class="orb" id="orb" role="application" aria-label="Hologram calculator">
      <div class="display-holo" role="textbox" aria-live="polite">
          <div id="expression" class="exp" aria-label="Expression">0</div>
          <div class="prev-row">
            <div id="preview" class="prev" aria-label="Preview value">—</div>
            <div class="preview-actions">
              <button id="copyBtn" title="Copy result">📋</button>
              <button id="clearHistoryBtn" title="Clear history">🗑</button>
            </div>
          </div>
      </div>

      <div class="ring ring1" aria-hidden="true"></div>
      <div class="ring ring2" aria-hidden="true"></div>

      <div class="keypad">
        <button class="k" data-action="clear" aria-label="All clear">AC</button>
        <button class="k" data-action="back" aria-label="Backspace">⌫</button>
        <button class="k" data-value="(" aria-label="Open parenthesis">(</button>
        <button class="k" data-value=")" aria-label="Close parenthesis">)</button>

        <button class="k" data-value="7">7</button>
        <button class="k" data-value="8">8</button>
        <button class="k" data-value="9">9</button>
        <button class="k op" data-value="÷">÷</button>

        <button class="k" data-value="4">4</button>
        <button class="k" data-value="5">5</button>
        <button class="k" data-value="6">6</button>
        <button class="k op" data-value="×">×</button>

        <button class="k" data-value="1">1</button>
        <button class="k" data-value="2">2</button>
        <button class="k" data-value="3">3</button>
        <button class="k op" data-value="-">-</button>

        <button class="k zero" data-value="0">0</button>
        <button class="k" data-value=".">.</button>
        <button class="k op" data-value="+">+</button>

        <!-- Advanced row -->
        <button class="k adv" data-value="%" title="Percent">%</button>
        <button class="k adv" data-value="^" title="Power">^</button>
        <button class="k adv" data-value="√" title="Square root">√</button>
        <button class="k adv" data-value="!" title="Factorial">!</button>

        <button class="k eq" data-action="equals" aria-label="Equals">=</button>
      </div>
  </div>

  <aside id="historyPanel" class="history-panel" aria-label="Calculation history">
    <div class="history-header">
      <h3>History</h3>
      <button id="exportBtn" title="Export history">⇪</button>
    </div>
    <ul id="historyList" class="history-list"></ul>
    <div class="history-footer">
      <small>Saved locally · click entry to reuse</small>
    </div>
  </aside>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/sfx/preview/mixkit-ui-interface-click-1124.mp3"></audio>
<audio id="snd-eq" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-power-up-204.wav"></audio>

<!-- math.js (for safe, advanced math parsing) -->
<script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.0/lib/browser/math.js"></script>
<script src="script.js"></script>
</body>
</html>
